    <style>
    /* www/css/estilos.css */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {
        --bg-color: #f4f7fc; --teal-main: #38b2ac; --teal-light: #4fd1c5;
        --text-dark: #1a202c; --text-muted: #a0aec0; --white: #ffffff;
        --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        --cat-purple: #667eea; --cat-blue: #4299e1; --cat-orange: #ed8936; --cat-pink: #ed64a6;
        
        /* Variables para los inputs */
        --input-bg: #eef2f7;
        --input-border: #8e9bb0; /* Color gris ratón */
    }

    /* Tema Oscuro Dinámico */
    body.dark-theme {
        --bg-color: #1a202c;
        --white: #2d3748;
        --text-dark: #f4f7fc;
        --text-muted: #a0aec0;
        --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        --input-bg: #1a202c;
        --input-border: #4a5568;
    }

    body {
        background-color: var(--bg-color); color: var(--text-dark);
        font-family: 'Nunito', system-ui, sans-serif; min-height: 100vh;
        margin: 0; padding-bottom: calc(90px + env(safe-area-inset-bottom)); overflow-x: hidden;
    }

    .text-teal { color: var(--teal-main) !important; }
    .bg-teal { background: var(--teal-main) !important; }
    
    .btn-teal {
        background-color: var(--teal-main); color: white; border-radius: 1rem;
        padding: 0.8rem; font-weight: 700; border: none;
        box-shadow: 0 8px 15px rgba(56, 178, 172, 0.3); transition: all 0.3s ease;
    }
    .btn-teal:hover { background-color: #2c8c87; color: white; transform: translateY(-2px); }
    
    .btn-circle {
        width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center;
        justify-content: center; background: var(--white); box-shadow: var(--card-shadow);
        border: none; color: var(--text-dark); transition: transform 0.2s;
    }
    .btn-circle:active { transform: scale(0.9); }

    .top-bar {
        position: sticky; top: 0; z-index: 1000; padding-top: max(1rem, env(safe-area-inset-top));
        background: var(--bg-color); padding-bottom: 0.5rem;
    }

    .custom-input {
        border-radius: 1rem !important; border: 1px solid var(--input-border); background-color: var(--input-bg);
        padding: 0.8rem 1.2rem; font-weight: 600; color: var(--text-dark); transition: all 0.3s ease;
    }
    .custom-input:focus { background-color: var(--white); border-color: var(--teal-light); box-shadow: 0 0 0 4px rgba(56, 178, 172, 0.1); outline: none; }
    .custom-input::placeholder { color: var(--input-border); font-weight: 600; }
    
    .input-group > .custom-input { border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important; border-right: none; }
    .input-group-text.custom-addon {
        background-color: var(--input-bg); border: 1px solid var(--input-border); border-left: none;
        border-top-right-radius: 1rem !important; border-bottom-right-radius: 1rem !important;
        color: var(--text-muted); cursor: pointer; transition: all 0.3s ease;
    }
    .input-group:focus-within .custom-addon { background-color: var(--white); border-color: var(--teal-light); border-left-color: transparent; }

    .bottom-nav {
        position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1030;
        border-radius: 2rem 2rem 0 0; padding-bottom: env(safe-area-inset-bottom);
        background: var(--white); box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
    }
    .nav-content { display: flex; justify-content: space-between; align-items: center; height: 80px; padding: 0 20px; }
    
    /* Configuración base de los íconos */
    .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 20%; height: 100%; cursor: pointer; transition: all 0.3s ease; }
    .nav-item i { font-size: 1.5rem; transition: all 0.3s ease; }
    
    /* Colores únicos para cada ícono inferior que no se repiten */
    .nav-link[data-target="home"] { color: var(--cat-purple); opacity: 0.5; }
    .nav-link[data-target="folder"] { color: var(--cat-blue); opacity: 0.5; }
    .nav-link[data-target="overview"] { color: var(--cat-orange); opacity: 0.5; }
    .nav-link[data-target="login"] { color: var(--cat-pink); opacity: 0.5; }
    
    /* Efecto cuando están activos (Opacidad completa y tamaño) */
    .nav-link.active { opacity: 1; }
    .nav-item.active i { transform: scale(1.2); }
    
    .nav-item.fab-container { position: relative; }
    
    /* Ajustado: Eliminamos el fondo para dejar solo la imagen centrada y más grande */
    .fab {
        width: 70px; height: 70px; /* Tamaño aumentado para más legibilidad */
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.2s ease; margin-top: -35px; /* Lo sube ligeramente */
    }
    .fab:active { transform: scale(0.9); }

    .storage-card {
        background: linear-gradient(135deg, var(--teal-light), var(--teal-main));
        border-radius: 1.5rem; color: white; box-shadow: 0 15px 25px rgba(56, 178, 172, 0.3);
        position: relative; overflow: hidden;
    }
    .storage-card::before { content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%; }
    .progress-circle { width: 70px; height: 70px; border-radius: 50%; background: conic-gradient(white 80%, rgba(255,255,255,0.3) 0); display: flex; align-items: center; justify-content: center; position: relative; }
    .progress-circle::after { content: ""; width: 54px; height: 54px; background: var(--teal-main); border-radius: 50%; position: absolute; }
    .progress-circle span { position: relative; z-index: 1; font-weight: 800; font-size: 0.9rem; }
    
    .cat-icon-box { width: 60px; height: 60px; border-radius: 1.2rem; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; margin: 0 auto 0.5rem auto; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    .cat-text { font-size: 0.8rem; font-weight: 700; color: var(--text-dark); }
    .file-item { background: var(--white); border-radius: 1.2rem; padding: 1rem; margin-bottom: 0.8rem; display: flex; align-items: center; box-shadow: var(--card-shadow); }
    .file-icon { width: 50px; height: 50px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; margin-right: 1rem; }
    .folder-card { background: var(--white); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--card-shadow); text-align: left; }
    .folder-card i { color: var(--teal-main); font-size: 2.5rem; }

    .modal-content { border-radius: 1.5rem; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .modal-header { border-bottom: 1px solid #eef2f7; }
    .modal-footer { border-top: 1px solid #eef2f7; }

    .module-fade-in { animation: fadeInModule 0.3s ease forwards; }
    @keyframes fadeInModule {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
    </style>
</head>

    <script>
    // js/login.js
    window.templates = window.templates || {};
    window.templates.login = `
        <div class="module-fade-in pb-5">
            <header class="top-bar text-center mb-4 pt-4">
                <img src="img/logo.png" alt="Logo" class="mx-auto d-block mb-3" style="width: 80px; height: 80px; object-fit: contain;">
                <h4 class="fw-bold mb-1">Bienvenido</h4>
                <p class="text-muted small">Inicia sesión para acceder a tu nube</p>
            </header>
            <form onsubmit="window.handleLogin(event)" class="px-2">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted ms-1">Email</label>
                    <input type="email" class="form-control custom-input" placeholder="tu@correo.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted ms-1">Contraseña</label>
                    <div class="input-group">
                        <input type="password" id="login-pass" class="form-control custom-input" placeholder="••••••••" required>
                        <span class="input-group-text custom-addon" onclick="window.toggleLoginPassword('login-pass', 'login-eye')">
                            <i class="bi bi-eye" id="login-eye"></i>
                        </span>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label small fw-bold text-muted" for="rememberMe">Recordar Contraseña</label>
                    </div>
                    <a href="#" class="text-teal text-decoration-none small fw-bold" data-bs-toggle="modal" data-bs-target="#recoveryModal">Olvidé Contraseña</a>
                </div>
                <button type="submit" class="btn btn-teal w-100 mb-4">Ingresar</button>
                <div class="text-center">
                    <span class="text-muted small fw-bold">¿No tienes cuenta?</span>
                    <a href="#registro" class="text-teal text-decoration-none small fw-bold ms-1">Regístrate</a>
                </div>
            </form>
        </div>
    `;

    window.toggleLoginPassword = function(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text"; icon.classList.replace('bi-eye', 'bi-eye-slash'); icon.classList.add('text-teal');
        } else {
            input.type = "password"; icon.classList.replace('bi-eye-slash', 'bi-eye'); icon.classList.remove('text-teal');
        }
    };

    window.handleLogin = function(e) {
        e.preventDefault();
        window.showSysAlert('success', '¡Conectado!', 'Has iniciado sesión correctamente.');
        setTimeout(() => {
            const alertModal = document.getElementById('sysAlertModal');
            if(alertModal) { const modalInstance = bootstrap.Modal.getInstance(alertModal); if(modalInstance) modalInstance.hide(); }
            window.location.hash = 'home';
        }, 1500);
    };

    window.processRecoveryFile = function() {
        const fileInput = document.getElementById('jsonKeyFile');
        if(!fileInput.files.length) return window.showSysAlert('warning', 'Atención', 'Selecciona tu archivo .json');
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(data.password_hash && data.pin_hash) {
                    const modalInstance = bootstrap.Modal.getInstance(document.getElementById('recoveryModal'));
                    if(modalInstance) modalInstance.hide();
                    window.showSysAlert('success', 'Llave Validada', `Hola ${data.nombre}, hemos verificado tu llave.`);
                } else throw new Error();
            } catch(err) { window.showSysAlert('warning', 'Error', 'El archivo cargado no es válido o está corrupto.'); }
        };
        reader.readAsText(fileInput.files[0]);
    };
    </script>

    <script>
    // js/registro.js
    window.templates = window.templates || {};
    window.templates.registro = `
        <div class="module-fade-in pb-5">
            <header class="top-bar d-flex align-items-center mb-4">
                <a href="#login" class="btn-circle me-3 text-decoration-none"><i class="bi bi-arrow-left fs-5"></i></a>
                <h5 class="mb-0 fw-bold">Crear Cuenta</h5>
            </header>
            <form id="registerForm" onsubmit="window.handleRegister(event)" class="px-2">
                <div class="row g-2 mb-3">
                    <div class="col-12"><input type="text" id="reg-nombre" class="form-control custom-input" placeholder="Nombre" required></div>
                    <div class="col-6"><input type="text" id="reg-ape1" class="form-control custom-input" placeholder="Primer Apellido" required></div>
                    <div class="col-6"><input type="text" id="reg-ape2" class="form-control custom-input" placeholder="Segundo Apellido"></div>
                </div>
                <div class="mb-3"><input type="email" id="reg-email" class="form-control custom-input" placeholder="Email" required></div>
                <div class="mb-3"><input type="tel" id="reg-tel" class="form-control custom-input" placeholder="Teléfono" required></div>
                <div class="mb-3">
                    <div class="input-group">
                        <input type="password" id="reg-pass" class="form-control custom-input" placeholder="Contraseña" required>
                        <span class="input-group-text custom-addon" onclick="window.toggleRegPassword('reg-pass', 'reg-eye-1')"><i class="bi bi-eye" id="reg-eye-1"></i></span>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="input-group">
                        <input type="password" id="reg-pass2" class="form-control custom-input" placeholder="Verificar Contraseña" required>
                        <span class="input-group-text custom-addon" onclick="window.toggleRegPassword('reg-pass2', 'reg-eye-2')"><i class="bi bi-eye" id="reg-eye-2"></i></span>
                    </div>
                    <div id="pass-error" class="text-danger small fw-bold mt-1 d-none ms-1">Las contraseñas no coinciden</div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted ms-1">PIN de recuperación (6 dígitos)</label>
                    <input type="text" id="reg-pin" class="form-control custom-input text-center fs-4 tracking-widest" placeholder="••••••" maxlength="6" pattern="[0-9]{6}" required oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>
                <button type="submit" class="btn btn-teal w-100 mb-4" id="btn-registrar">Registrar y Generar Llave</button>
            </form>
        </div>
    `;

    window.toggleRegPassword = function(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text"; icon.classList.replace('bi-eye', 'bi-eye-slash'); icon.classList.add('text-teal');
        } else {
            input.type = "password"; icon.classList.replace('bi-eye-slash', 'bi-eye'); icon.classList.remove('text-teal');
        }
    };

    window.handleRegister = function(e) {
        e.preventDefault();
        const pass1 = document.getElementById('reg-pass').value;
        const pass2 = document.getElementById('reg-pass2').value;
        const errLabel = document.getElementById('pass-error');

        if(pass1 !== pass2) { errLabel.classList.remove('d-none'); return; }
        errLabel.classList.add('d-none');

        const btn = document.getElementById('btn-registrar');
        const originalText = btn.innerText;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Procesando...';
        btn.disabled = true;

        setTimeout(() => {
            try {
                const nombre = document.getElementById('reg-nombre').value;
                const salt = dcodeIO.bcrypt.genSaltSync(10);
                const userData = {
                    nombre: nombre,
                    email: document.getElementById('reg-email').value,
                    password_hash: dcodeIO.bcrypt.hashSync(pass1, salt),
                    pin_hash: dcodeIO.bcrypt.hashSync(document.getElementById('reg-pin').value, salt)
                };

                const blob = new Blob([JSON.stringify(userData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = `myCloudKey_${nombre.toLowerCase()}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);

                window.showSysAlert('warning', '¡Llave Generada!', 'Se ha descargado una llave a tu dispositivo. Guárdala en un lugar seguro.');
                setTimeout(() => { window.location.hash = 'login'; }, 3500);
            } catch (error) { window.showSysAlert('warning', 'Error', 'Hubo un problema generando la llave.');
            } finally { btn.innerHTML = originalText; btn.disabled = false; }
        }, 800);
    };
    </script>

    window.templates.overview = `
        <div class="module-fade-in pb-4">
            <header class="top-bar d-flex justify-content-between align-items-center mb-3">
                <a href="#home" class="btn-circle text-decoration-none"><i class="bi bi-arrow-left fs-5"></i></a>
                <h5 class="mb-0 fw-bold">Overview</h5>
                <button class="btn-circle"><i class="bi bi-three-dots fs-5"></i></button>
            </header>
            <div class="storage-card p-4 mb-4 text-center">
                <h6 class="mb-4">Available Storage</h6>
                <div class="progress-circle mx-auto mb-4" style="width: 120px; height: 120px;"><span style="font-size: 1.5rem;">80%</span></div>
                <div class="d-flex justify-content-around">
                    <div><div class="small opacity-75"><i class="bi bi-circle-fill me-1" style="font-size: 0.5rem; color: white;"></i>Total</div><div class="fw-bold">512 GB</div></div>
                    <div><div class="small opacity-75"><i class="bi bi-circle-fill me-1" style="font-size: 0.5rem; color: rgba(255,255,255,0.5);"></i>Used</div><div class="fw-bold">130 GB</div></div>
                </div>
            </div>
        </div>
    `;
    </script>

    <script>
    // js/app.js
    window.showSysAlert = function(type, title, message) {
        document.getElementById('sysAlertTitle').innerText = title;
        document.getElementById('sysAlertMsg').innerText = message;
        
        let iconHtml = '';
        if(type === 'success') iconHtml = '<i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>';
        else if (type === 'warning') iconHtml = '<i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 3rem;"></i>';
        else iconHtml = '<i class="bi bi-info-circle-fill text-info" style="font-size: 3rem;"></i>';
        
        document.getElementById('sysAlertIcon').innerHTML = iconHtml;
        new bootstrap.Modal(document.getElementById('sysAlertModal')).show();
    };

    window.handleAction = function(e) {
        e.preventDefault();
        const fab = document.querySelector('.fab');
        fab.style.transform = 'scale(0.8)';
        setTimeout(() => fab.style.transform = '', 150);
    };

    // --- NUEVO: Función para alternar Modo Oscuro ---
    window.toggleTheme = function() {
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');
        body.classList.toggle('dark-theme');
        
        if (body.classList.contains('dark-theme')) {
            if(themeIcon) themeIcon.classList.replace('bi-moon-fill', 'bi-sun-fill');
            localStorage.setItem('theme', 'dark');
        } else {
            if(themeIcon) themeIcon.classList.replace('bi-sun-fill', 'bi-moon-fill');
            localStorage.setItem('theme', 'light');
        }
    };
    // -------------------------------------------------

    function route() {
        const viewId = window.location.hash.substring(1) || 'login';
        const container = document.getElementById('app-container');

        if(window.templates && window.templates[viewId]) {
            container.innerHTML = window.templates[viewId];
        } else {
            container.innerHTML = `<div class="text-center mt-5 pt-5"><h4>Error 404</h4><p>Vista no encontrada.</p></div>`;
        }

        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-link[data-target="${viewId === 'registro' ? 'login' : viewId}"]`);
        if(activeNav) activeNav.classList.add('active');

        window.scrollTo(0, 0);
    }

    window.addEventListener('hashchange', route);
    
    // --- MODIFICADO: Recuperar tema al cargar ---
    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            const themeIcon = document.getElementById('theme-icon');
            if(themeIcon) themeIcon.classList.replace('bi-moon-fill', 'bi-sun-fill');
        }
        route();
    });
    </script>
</body>
</html>
