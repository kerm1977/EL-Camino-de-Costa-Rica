<!-- www/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cloud App - Capacitor</title>

    <!-- Dependencias Externas Seguras -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>

    <style>
    /* Estilos Globales Integrados */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {
        --bg-color: #f4f7fc; --teal-main: #38b2ac; --teal-light: #4fd1c5;
        --text-dark: #1a202c; --text-muted: #a0aec0; --white: #ffffff;
        --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        --cat-purple: #667eea; --cat-blue: #4299e1; --cat-orange: #ed8936; --cat-pink: #ed64a6;
        --input-bg: #eef2f7;
        --input-border: #8e9bb0; 
    }

    body.dark-theme {
        --bg-color: #1a202c;
        --white: #2d3748;
        --text-dark: #f4f7fc;
        --text-muted: #a0aec0;
        --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        --input-bg: #1a202c;
        --input-border: #4a5568;
    }

    body {
        background-color: var(--bg-color); color: var(--text-dark);
        font-family: 'Nunito', system-ui, sans-serif; min-height: 100vh;
        margin: 0; padding-bottom: calc(90px + env(safe-area-inset-bottom)); overflow-x: hidden;
    }

    .text-teal { color: var(--teal-main) !important; }
    .bg-teal { background: var(--teal-main) !important; }
    
    /* Colores Squircles */
    .bg-cat-purple { background-color: var(--cat-purple) !important; }
    .bg-cat-blue { background-color: var(--cat-blue) !important; }
    .bg-cat-orange { background-color: var(--cat-orange) !important; }
    .bg-cat-pink { background-color: var(--cat-pink) !important; }

    .btn-teal {
        background-color: var(--teal-main); color: white; border-radius: 1rem;
        padding: 0.8rem; font-weight: 700; border: none;
        box-shadow: 0 8px 15px rgba(56, 178, 172, 0.3); transition: all 0.3s ease;
    }
    .btn-teal:hover { background-color: #2c8c87; color: white; transform: translateY(-2px); }
    .btn-danger-custom { background-color: #e53e3e; color: white; border-radius: 1rem; padding: 0.8rem; font-weight: 700; border: none; }
    .btn-danger-custom:hover { background-color: #c53030; color: white; }

    .btn-circle {
        width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center;
        justify-content: center; background: var(--white); box-shadow: var(--card-shadow);
        border: none; color: var(--text-dark); transition: transform 0.2s;
    }
    .btn-circle:active { transform: scale(0.9); }

    .top-bar {
        position: sticky; top: 0; z-index: 1000; padding-top: max(1rem, env(safe-area-inset-top));
        background: var(--bg-color); padding-bottom: 0.5rem;
    }

    .custom-input, .custom-select {
        border-radius: 1rem !important; border: 1px solid var(--input-border); background-color: var(--input-bg);
        padding: 0.8rem 1.2rem; font-weight: 600; color: var(--text-dark); transition: all 0.3s ease; width: 100%;
    }
    .custom-input:focus, .custom-select:focus { background-color: var(--white); border-color: var(--teal-light); box-shadow: 0 0 0 4px rgba(56, 178, 172, 0.1); outline: none; }
    .custom-input::placeholder { color: var(--input-border); font-weight: 600; }

    .input-group > .custom-input { border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important; border-right: none; }
    .input-group-text.custom-addon {
        background-color: var(--input-bg); border: 1px solid var(--input-border); border-left: none;
        border-top-right-radius: 1rem !important; border-bottom-right-radius: 1rem !important;
        color: var(--text-muted); cursor: pointer; transition: all 0.3s ease;
    }
    .input-group:focus-within .custom-addon { background-color: var(--white); border-color: var(--teal-light); border-left-color: transparent; }

    .bottom-nav {
        position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1030;
        border-radius: 2rem 2rem 0 0; padding-bottom: env(safe-area-inset-bottom);
        background: var(--white); box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
    }
    .nav-content { display: flex; justify-content: space-between; align-items: center; height: 80px; padding: 0 20px; }
    .nav-item { color: var(--text-muted); text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 20%; height: 100%; cursor: pointer; transition: all 0.3s ease; }
    .nav-item i { font-size: 1.5rem; transition: all 0.3s ease; }
    
    .nav-link[data-target="home"] { color: var(--cat-purple); opacity: 0.5; }
    .nav-link[data-target="folder"] { color: var(--cat-blue); opacity: 0.5; }
    .nav-link[data-target="overview"] { color: var(--cat-orange); opacity: 0.5; }
    .nav-link[data-target="login"] { color: var(--cat-pink); opacity: 0.5; }
    
    .nav-link.active { opacity: 1; }
    .nav-item.active i { transform: scale(1.2); }

    .nav-item.fab-container { position: relative; }
    .fab {
        width: 70px; height: 70px;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.2s ease; margin-top: -35px;
    }
    .fab:active { transform: scale(0.9); }

    .storage-card {
        background: linear-gradient(135deg, var(--teal-light), var(--teal-main));
        border-radius: 1.5rem; color: white; box-shadow: 0 15px 25px rgba(56, 178, 172, 0.3);
        position: relative; overflow: hidden;
    }
    .storage-card::before { content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%; }
    .progress-circle { width: 70px; height: 70px; border-radius: 50%; background: conic-gradient(white 80%, rgba(255,255,255,0.3) 0); display: flex; align-items: center; justify-content: center; position: relative; }
    .progress-circle::after { content: ""; width: 54px; height: 54px; background: var(--teal-main); border-radius: 50%; position: absolute; }
    .progress-circle span { position: relative; z-index: 1; font-weight: 800; font-size: 0.9rem; }

    .folder-card { background: var(--white); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--card-shadow); text-align: left; transition: transform 0.2s; }
    .folder-card:active { transform: scale(0.95); }

    .squircle {
        width: 60px; 
        height: 60px; 
        border-radius: 18px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        color: white; 
        font-size: 1.8rem; 
        box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        flex-shrink: 0;
    }

    .modal-content { border-radius: 1.5rem; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .modal-header { border-bottom: 1px solid #eef2f7; }
    .modal-footer { border-top: 1px solid #eef2f7; }

    .card-perfil { background: var(--white); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--card-shadow); }
    .form-switch .form-check-input { width: 3em; height: 1.5em; cursor: pointer; }
    .form-switch .form-check-input:checked { background-color: var(--teal-main); border-color: var(--teal-main); }

    .module-fade-in { animation: fadeInModule 0.3s ease forwards; }
    @keyframes fadeInModule {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* --- ESTILOS MODO LECTURA PARA EL PERFIL --- */
    .profile-input[readonly], .profile-input[disabled] {
        background-color: transparent !important;
        border-color: transparent !important;
        padding-left: 0;
        padding-right: 0;
        font-weight: 800;
        color: var(--text-dark) !important;
        box-shadow: none !important;
        appearance: none;
        -webkit-appearance: none;
    }
    .profile-input[readonly]::placeholder { color: transparent !important; }
    .profile-input[type="file"][disabled] { display: none !important; }
    </style>
</head>
<body>

    <!-- Botones Globales Superiores -->
    <button onclick="window.toggleTheme()" class="btn-circle position-fixed" style="top: max(1rem, env(safe-area-inset-top)); right: 1rem; z-index: 1050; width: 40px; height: 40px;">
        <i class="bi bi-moon-fill" id="theme-icon"></i>
    </button>
    <a href="#perfil" id="top-profile-btn" class="btn-circle position-fixed" style="top: max(1rem, env(safe-area-inset-top)); right: 4rem; z-index: 1050; width: 40px; height: 40px; text-decoration: none; display: none;">
        <i class="bi bi-person-circle fs-5 text-teal"></i>
    </a>

    <!-- Contenedor Maestro -->
    <main id="app-container" class="container py-2"></main>

    <!-- Navegación Inferior -->
    <nav class="bottom-nav">
        <div class="nav-content">
            <a href="#home" class="nav-item nav-link" data-target="home"><i class="bi bi-house-door-fill"></i></a>
            <a href="#folder" class="nav-item nav-link" data-target="folder"><i class="bi bi-folder-fill"></i></a>
            <a href="#" class="nav-item fab-container" onclick="window.handleAction(event)">
                <div class="fab">
                    <img src="img/logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
            </a>
            <a href="#overview" class="nav-item nav-link" data-target="overview"><i class="bi bi-star-fill"></i></a>
            <a href="#login" class="nav-item nav-link" data-target="login" id="profile-link"><i class="bi bi-person-fill"></i></a>
        </div>
    </nav>

    <!-- Modales Globales -->
    <div class="modal fade" id="recoveryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-teal">Recuperar Cuenta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <i class="bi bi-key-fill fs-1 text-muted mb-2 d-block"></i>
                    <p class="small text-muted fw-bold mb-3">Inserta el archivo JSON de tu llave.</p>
                    <input class="form-control custom-input" type="file" id="jsonKeyFile" accept=".json">
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-teal w-100" onclick="window.processRecoveryFile()">Procesar Llave</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="sysAlertModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-4">
                    <div id="sysAlertIcon" class="mb-3"></div>
                    <h5 class="fw-bold mb-2" id="sysAlertTitle">Notificación</h5>
                    <p class="text-muted small fw-bold" id="sysAlertMsg"></p>
                    <button type="button" class="btn btn-teal w-100 mt-3" data-bs-dismiss="modal">Entendido</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="sysConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-exclamation-octagon-fill text-danger mb-3 d-block" style="font-size: 3rem;"></i>
                    <h5 class="fw-bold mb-2" id="sysConfirmTitle">Confirmación</h5>
                    <p class="text-muted small fw-bold" id="sysConfirmMsg"></p>
                    <div class="d-flex gap-2 mt-4">
                        <button type="button" class="btn btn-secondary w-50" data-bs-dismiss="modal" style="border-radius: 1rem;">Cancelar</button>
                        <button type="button" class="btn btn-danger-custom w-50" onclick="window.executeConfirm()">Confirmar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts Base -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Inicialización del objeto global de plantillas -->
    <script>
        window.templates = window.templates || {};
    </script>

    <!-- CARGA DE MÓDULOS DE LA APP EN ORDEN -->
    <script src="js/afiliados.js"></script>
    <script src="js/vistas.js"></script>
    <script src="js/login.js"></script>
    <script src="js/registro.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
